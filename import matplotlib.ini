import matplotlib.pyplot as plt
import os

def create_and_save_robot_map():
    # 1. 고해상도 다크 테마 캔버스 세팅
    fig, ax = plt.subplots(figsize=(10, 12), dpi=200, facecolor='#2b2b2b')
    ax.set_xlim(0, 100)
    ax.set_ylim(0, 110)
    ax.axis('off') # 배경 축/눈금 숨기기

    # 2. 로봇 뼈대 그리기 (어두운 회색 선)
    lines = [
        ([50, 50], [95, 60]),               # 척추 (목 -> 허리)
        ([35, 65], [80, 80]),               # 양어깨 라인
        ([35, 25, 25, 25], [80, 80, 60, 40]), # 오른팔 (어깨 -> 롤 -> 팔꿈치 -> 손목)
        ([65, 75, 75, 75], [80, 80, 60, 40]), # 왼팔
        ([40, 60], [55, 55]),               # 골반 라인
        ([40, 40, 40, 40, 40], [55, 45, 25, 10, 5]), # 오른다리
        ([60, 60, 60, 60, 60], [55, 45, 25, 10, 5])  # 왼다리
    ]
    
    for xs, ys in lines:
        ax.plot(xs, ys, color='#555555', lw=6, zorder=1, solid_capstyle='round')

    # 3. 23개 다이나믹셀 모터 데이터 (x, y, ID, 이름, 모터타입)
    motors = [
        (50, 105, 0, 'Head_Pan', '28'),
        (50, 95,  1, 'Head_Tilt', '28'),
        (35, 80,  2, 'R_Shoulder_Pitch', '64'),
        (65, 80,  3, 'L_Shoulder_Pitch', '64'),
        (25, 80,  4, 'R_Shoulder_Roll', '28'),
        (75, 80,  5, 'L_Shoulder_Roll', '28'),
        (25, 60,  6, 'R_Elbow_Pitch', '28'),
        (75, 60,  7, 'L_Elbow_Pitch', '28'),
        (25, 40,  8, 'R_Wrist_Yaw', '28'),
        (75, 40,  9, 'L_Wrist_Yaw', '28'),
        (50, 60,  11, 'Waist_Yaw', '106'),
        (40, 55,  10, 'R_Hip_Yaw', '106'),
        (60, 55,  12, 'L_Hip_Yaw', '106'),
        (35, 45,  13, 'R_Hip_Roll', '106'),
        (65, 45,  14, 'L_Hip_Roll', '106'),
        (43, 45,  15, 'R_Hip_Pitch', '106'),
        (57, 45,  16, 'L_Hip_Pitch', '106'),
        (40, 25,  17, 'R_Knee_Pitch', '106'),
        (60, 25,  18, 'L_Knee_Pitch', '106'),
        (40, 10,  19, 'R_Ankle_Pitch', '106'),
        (60, 10,  20, 'L_Ankle_Pitch', '106'),
        (40, 5,   21, 'R_Ankle_Roll', '106'),
        (60, 5,   22, 'L_Ankle_Roll', '106')
    ]

    # 4. 모터 노드 및 텍스트 렌더링
    for x, y, m_id, name, m_type in motors:
        # GUI랑 똑같이 모터 기종별 색상 부여!
        if m_type == '28':
            color = '#FF8C00'   # MX-28: 주황색
        elif m_type == '64':
            color = '#28a745'   # MX-64: 초록색
        else:
            color = '#4DA6FF'   # MX-106: 파란색

        # 모터 위치에 동그라미 그리기
        ax.scatter(x, y, s=800, color='#333333', edgecolors=color, linewidth=3, zorder=2)
        
        # 동그라미 안에 ID 번호 넣기
        ax.text(x, y, str(m_id), color='white', fontsize=11, fontweight='bold', ha='center', va='center', zorder=3)
        
        # 모터 이름 옆에 텍스트로 적어주기
        offset = 5 if x >= 50 else -5
        align = 'left' if x >= 50 else 'right'
        
        # 겹치는 허리/골반 모터 텍스트 위치 미세 조정
        if m_id in [10, 13, 15]: 
            offset = -6
            align = 'right'
        elif m_id in [12, 14, 16]:
            offset = 6
            align = 'left'
            
        ax.text(x + offset, y, name, color=color, fontsize=10, fontweight='bold', ha=align, va='center', zorder=3)

    # 5. 제목 달기
    plt.title("🤖 IRC Humanoid Motor ID Map", color='#e0e0e0', fontsize=18, fontweight='bold', pad=20)
    
    # 🔥 6. 대망의 이미지 파일 강제 저장 로직!
    save_path = os.path.join(os.getcwd(), 'robot_id_map.jpg')
    plt.savefig(save_path, facecolor=fig.get_facecolor(), bbox_inches='tight')
    plt.close()
    
    print("======================================================")
    print(f"🎉 파일 저장 완료! [{save_path}]")
    print("이제 이 이미지를 sdk_gui.py가 있는 폴더에 놔두고 실행해봐!")
    print("======================================================")

if __name__ == '__main__':
    create_and_save_robot_map()